dataset:
  raw_root: "data/ny_state"
  sample_size: 100
  knn_k: 8
  ordering: "xy"
  neighbor_metric: "haversine"
  split_mode: "county"
  heldout_counties: ["061"]
  val_counties: ["047"]
  num_train_samples: 16
  num_val_samples: 4
  num_test_samples: 4
  batch_size: 1

model:
  gps_layers: 4
  hidden_dim: 128
  heads: 4
  dropout: 0.1
  lap_pe_dim: 8
  rw_steps: 2
  pair_dim: 64
  latent_channels: 16
  diffusion_steps: 100

train:
  optimizer: "AdamW"
  lr_gravity: 0.001
  lr_pair_mlp: 0.0002
  lr_regressor: 0.0002
  lr_ae: 0.001
  lr_diffusion: 0.0002
  weight_decay: 0.0001
  epochs:
    gravity: 1
    pair_mlp: 1
    regressor: 1
    ae: 1
    diffusion: 1
  device: "cpu"
  seed: 20260317

eval:
  threshold: 0.0
  top_k: 5
  distance_bins: [0.0, 2.0, 5.0, 10.0, 20.0, 40.0, 80.0, 160.0, 320.0]
  figures_dir: "od_zero_shot/artifacts/figures"
  metrics_path: "od_zero_shot/artifacts/metrics/metrics.json"
